name: Vercel Production

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dreamingin1989.com
    defaults:
      run:
        working-directory: shop-only
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: shop-only/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@54.18.7

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        id: deploy
        shell: bash
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test production
        run: |
          node -e 'const checks=["https://dreamingin1989.com/","https://dreamingin1989.com/api/integrations/status","https://dreamingin1989.com/api/printful/store"]; for (const url of checks) { const response = await fetch(url); if (!response.ok) throw new Error(url + " returned " + response.status); console.log(url + " OK"); }'

      - name: Scan recent Vercel errors
        run: vercel logs ${{ steps.deploy.outputs.url }} --since 10m --level error --token=${{ secrets.VERCEL_TOKEN }}
